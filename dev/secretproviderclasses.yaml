apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: frontend-service-spc
  namespace: dev
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "<FRONTEND_MANAGED_IDENTITY_CLIENT_ID>"
    keyvaultName: "<KEY_VAULT_NAME>"
    tenantId: "<AZURE_TENANT_ID>"
    objects: |
      array:
        - |
          objectName: placeholder-secret
          objectType: secret
          objectAlias: PLACEHOLDER_SECRET
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: core-api-service-spc
  namespace: dev
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "<CORE_API_MANAGED_IDENTITY_CLIENT_ID>"
    keyvaultName: "<KEY_VAULT_NAME>"
    tenantId: "<AZURE_TENANT_ID>"
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
          objectAlias: DATABASE_URL
        - |
          objectName: jwt-secret-key
          objectType: secret
          objectAlias: JWT_SECRET_KEY
        - |
          objectName: internal-api-key
          objectType: secret
          objectAlias: INTERNAL_API_KEY
  secretObjects:
    - secretName: core-api-service-secret
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
        - objectName: jwt-secret-key
          key: JWT_SECRET_KEY
        - objectName: internal-api-key
          key: INTERNAL_API_KEY
---
