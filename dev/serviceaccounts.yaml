apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-service-sa
  namespace: dev
  annotations:
    azure.workload.identity/client-id: "<FRONTEND_MANAGED_IDENTITY_CLIENT_ID>"
  labels:
    app: frontend-service
    app.kubernetes.io/name: frontend-service
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: opsgpt
    environment: dev
    azure.workload.identity/use: "true"
