apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: prod
  labels:
    app: frontend-service
    app.kubernetes.io/name: frontend-service
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: opsgpt
    environment: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend-service
      environment: prod
  template:
    metadata:
      labels:
        app: frontend-service
        app.kubernetes.io/name: frontend-service
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: opsgpt
        environment: prod
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: frontend-service-sa
      containers:
        - name: frontend-service
          image: opsgpt.azurecr.io/opsgpt/frontend-service:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api-service
  namespace: prod
  labels:
    app: core-api-service
    app.kubernetes.io/name: core-api-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: opsgpt
    environment: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: core-api-service
      environment: prod
  template:
    metadata:
      labels:
        app: core-api-service
        app.kubernetes.io/name: core-api-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: opsgpt
        environment: prod
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: core-api-service-sa
      containers:
        - name: core-api-service
          image: opsgpt.azurecr.io/opsgpt/core-api-service:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: core-api-service-secret
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: core-api-service-secret
                  key: JWT_SECRET_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: core-api-service-secret
                  key: INTERNAL_API_KEY
            - name: JWT_ALGORITHM
              value: "HS256"
            - name: JWT_EXPIRE_MINUTES
              value: "60"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8004"
            - name: ENABLE_NOTIFICATIONS
              value: "true"
            - name: APP_ENV
              value: "production"
            - name: CORS_ORIGINS
              value: "*"
          volumeMounts:
            - name: secrets-mount
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-mount
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: core-api-service-spc
---
